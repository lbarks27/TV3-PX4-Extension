schema: tv3_flight_profile_v1
name: lander_waypoint_track
description: Nominal waypoint-track and landing-approach scenario for tv3_lander_v1.
vehicle: tv3_lander_v1
scenario:
  type: waypoint_track
  simulator: sih
  intent: Exercise launch, waypoint track, hover/descend, and landing approach in one deterministic run.
  simulated_only: true
guidance:
  enable: 1
  ascent_mode: launch_ascent
  apogee_mode: track
  landing_mode: approach
  takeoff_alt_m: 10.0
  apex_alt_m: 45.0
  pos_p: 0.15
  vel_max_m_s: 12.0
  vel_up_m_s: 8.0
  vel_dn_m_s: 4.0
  yaw_deg: 0.0
  hold_alt_m: 5.0
  acceptance_m: 15.0
  min_twr: 1.05
  landing_twr: 1.15
  min_remaining_impulse_ns: 0.0
  wp1_n_m: 20.0
  wp1_e_m: 0.0
  wp1_d_m: -15.0
  wp2_n_m: 35.0
  wp2_e_m: 10.0
  wp2_d_m: -20.0
  wp3_n_m: 15.0
  wp3_e_m: 0.0
  wp3_d_m: -12.0
  wp1_mode: fly_through
  wp2_mode: fly_through
  wp3_mode: fly_through
  land_n_m: 0.0
  land_e_m: 0.0
  land_d_m: 0.0
mission_profile:
  first_free_flight_gate: single_engine_ascent
  required_sim_gates:
    - sih_force_response
    - load_cell_confirmed_sequence
    - waypoint_track
    - landing_approach
commands:
  - at_s: 0.0
    action: arm_and_ready
  - at_s: 1.0
    action: launch
review:
  required_topics:
    - tv3_guidance_status
    - trajectory_setpoint
    - vehicle_local_position
    - vehicle_attitude
    - tv3_engine_command
    - tv3_engine_state
  success_criteria:
    - all waypoints are reached within acceptance_m
    - landing approach begins only with sufficient landing_twr
    - final log includes guidance phase, waypoint index, and vehicle position
