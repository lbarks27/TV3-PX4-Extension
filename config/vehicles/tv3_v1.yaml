name: tv3_v1
description: Swerve Vector Control single-motor TVC tv3 baseline for PX4 v1.
hardware:
  autopilot: cube_orange_plus
  carrier: mini_carrier
  telemetry: rfd900
  gps:
    rover: here4_rtk
    base: here4_rtk_base
  ignition_output_function: 450
  tvc_pitch_output_function: 201
  tvc_yaw_output_function: 202
  load_cell:
    driver: ads1115
    source: 0
    adc_instance: 1
    adc_channel: 0
    negative_channel: 1
    mode: differential
    calibration:
      tare: 0.0
      scale: 1.0
      kg_per_count: 0.0
    alpha: 0.25
    deadband_counts: 0.0
    publish_rate_hz: 10
    timeout_ms: 200
vehicle:
  body_mass_kg: 1.0
  body_com_x_m: 0.95
  motor_com_x_m: 0.15
  motor_loaded_mass_kg: 0.75
  motor_dry_mass_kg: 0.28
  rail_length_m: 3.5
  tvc_max_deg: 5.0
  tvc_slew_dps: 250.0
  ca_reference_thrust_n: 250.0
  ca_minimum_thrust_n: 20.0
  ca_fallback_thrust_n: 60.0
  torque_limits_nm:
    pitch: 10.0
    yaw: 10.0
physical_model:
  status: preliminary
  reference_frame:
    origin: nozzle_exit_center
    x_axis: forward_along_airframe
    y_axis: vehicle_right
    z_axis: vehicle_down
  notes:
    - TVC CAD and inertias are provisional until measured mating frames, COM offsets, and joint axes are captured.
    - Base vehicle mass/inertia excludes the swerve axis and thrust joint moving links.
    - STEP sources remain CAD references; visual simulator adapters should convert them into renderable mesh formats outside the active generator.
  assemblies:
    - id: base_vehicle_without_tvc_moving_links
      total_mass_kg: 1.0
      inertia_about_origin_kg_m2:
        ixx: 0.14435
        iyy: 0.14435
        izz: 0.01
        ixy: 0.0
        ixz: 0.0
        iyz: 0.0
    - id: preliminary_total_with_tvc_moving_links
      total_mass_kg: 1.4
      inertia_about_origin_kg_m2:
        ixx: 0.14455
        iyy: 0.14455
        izz: 0.0102
        ixy: 0.0
        ixz: 0.0
        iyz: 0.0
  links:
    - id: body
      description: Base vehicle/fixed portion of Swerve Vector Control v4 assembly, excluding moving TVC links.
      parent: model
      mass_kg: 1.0
      pose_m: [0.0, 0.0, 0.0]
      com_m: [0.0, 0.0, 0.0]
      inertia_kg_m2:
        ixx: 0.14435
        iyy: 0.14435
        izz: 0.01
        ixy: 0.0
        ixz: 0.0
        iyz: 0.0
      cad:
        source_step: assets/cad/tvc/swerve_vector_control_v4.step
    - id: swerve_axis
      description: First moving TVC axis placeholder.
      parent: body
      mass_kg: 0.2
      pose_m: [0.0, 0.0, 0.0]
      com_m: [0.0, 0.0, 0.0]
      inertia_kg_m2:
        ixx: 0.0001
        iyy: 0.0001
        izz: 0.0001
        ixy: 0.0
        ixz: 0.0
        iyz: 0.0
      cad:
        source_step: assets/cad/tvc/swerve_axis_v2.step
    - id: thrust_joint
      description: Second moving TVC/thrust joint placeholder.
      parent: swerve_axis
      mass_kg: 0.2
      pose_m: [0.0, 0.0, 0.0]
      com_m: [0.0, 0.0, 0.0]
      inertia_kg_m2:
        ixx: 0.0001
        iyy: 0.0001
        izz: 0.0001
        ixy: 0.0
        ixz: 0.0
        iyz: 0.0
      cad:
        source_step: assets/cad/tvc/thrust_joint_v5.step
  joints:
    - id: tvc_pitch_axis
      type: revolute
      parent: body
      child: swerve_axis
      origin_m: [0.0, 0.0, 0.0]
      axis: [0.0, 1.0, 0.0]
      limit_rad: [-0.0872665, 0.0872665]
      effort_nm: 2.0
      velocity_rad_s: 4.363323
      damping: 0.0
      friction: 0.0
    - id: tvc_yaw_axis
      type: revolute
      parent: swerve_axis
      child: thrust_joint
      origin_m: [0.0, 0.0, 0.0]
      axis: [0.0, 0.0, 1.0]
      limit_rad: [-0.0872665, 0.0872665]
      effort_nm: 2.0
      velocity_rad_s: 4.363323
      damping: 0.0
      friction: 0.0
controller:
  attitude_p:
    rail: 2.0
    free: 3.0
  rate_p:
    rail: 0.35
    free: 0.5
  rate_i: 0.04
  rate_d: 0.003
state_machine:
  command_source: 1
  ignition_pulse_ms: 300
  ignition_timeout_ms: 2000
  launch_threshold_n: 10.0
  burnout_threshold_n: 4.0
  burnout_dwell_ms: 100
  minimum_burn_ms: 150
  maximum_burn_ms: 6000
  abort_on_gcs_loss: 0
motor_selection:
  index: 0
  catalog_root: /fs/microsd/tv3/motors
guidance:
  enable: 0
  takeoff_alt_m: 35.0
  apex_alt_m: 120.0
  pos_p: 0.15
  vel_max_m_s: 30.0
  vel_up_m_s: 15.0
  vel_dn_m_s: 8.0
  yaw_deg: 0.0
  hold_alt_m: 5.0
  acceptance_m: 15.0
  min_twr: 1.05
  landing_twr: 1.15
  min_remaining_impulse_ns: 0.0
  wp1_n_m: 60.0
  wp1_e_m: 0.0
  wp1_d_m: -60.0
  wp2_n_m: 150.0
  wp2_e_m: 30.0
  wp2_d_m: -90.0
  wp3_n_m: 220.0
  wp3_e_m: 80.0
  wp3_d_m: -75.0
  land_n_m: 0.0
  land_e_m: 0.0
  land_d_m: 0.0
